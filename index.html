            transition: background-color 0.3s, color 0.3s;
        }

        /* Dark Mode Configuration using CSS */
        .dark-mode {
            background-color: #111827; /* Darker background */
            color: #d1d5db;
        }
        .dark-mode .question-card {
            background-color: #1f2937; /* Card background */

        }

            background-color: #2c3440;
            color: #9ca3af;
        }
        .dark-mode .answer .highlight-text {
            color: #93c5fd !important; /* Light blue highlight */
        }
        .dark-mode .main-header-text, .dark-mode .question-number {
             color: #60a5fa !important; /* Blue primary color */
        }
        .dark-mode .question-text, .dark-mode .toggle-icon svg {
             color: #d1d5db; /* Light gray text */
        }
        .dark-mode #headerSubtext {
            color: #6b7280;
        }

        /* Shared transition properties */
        .answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-in-out, background-color 0.3s;
            padding: 0 1.5rem; 
        }
        .answer.open {
            max-height: 500px; 
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        .question-card {
            border-radius: 0.5rem; 
            background-color: white;
            border: 1px solid #e5e7eb;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.15s, box-shadow 0.3s, background-color 0.3s;
            overflow: hidden;
        }
        .question-card:hover {
            background-color: #f9fafb;
            transform: translateY(-1px);
        }
        .toggle-icon {
            transition: transform 0.2s;
        }
        .question-header.active .toggle-icon {
            transform: rotate(90deg);
        }
        .answer {
            background-color: #f7f9fd; /* Very light blue tint */
        }

            { question: "300 वनडे मैच खेलने वाले 7वें भारतीय क्रिकेटर कौन है", answer: "विराट कोहली" },
            { question: "3 मार्च, 2025 को तीसरा रणजी ट्रॉफी खिताब किसने जीता है", answer: "विदर्भ" },
            { question: "भारत के पहले विश्व शांति केंद्र का उ‌द्घाटन कहाँ हुआ है", answer: "गुरुग्राम" },
            { question: "4 मार्च, 2025 को कहाँ के 'रूशिकोंडा बीच' से ब्लू फ्लैग प्रमाणन का", answer: "(प्रश्न अधूरा)" }
        ];

        const body = document.body;
        const quizContainer = document.getElementById('quiz-container');
        const themeToggle = document.getElementById('themeToggle');
        const sunIcon = document.getElementById('sunIcon');
        const moonIcon = document.getElementById('moonIcon');

        // --- Theme Switching Logic ---
        function enableDarkMode() {
            body.classList.add('dark-mode');
            body.classList.remove('bg-gray-50');
            // Update Toggle Button Styles
            themeToggle.classList.remove('bg-gray-200', 'hover:bg-gray-300');
            themeToggle.classList.add('bg-gray-700', 'hover:bg-gray-600');

            sunIcon.classList.add('hidden');
            moonIcon.classList.remove('hidden');
            localStorage.setItem('theme', 'dark');
        }

        function enableLightMode() {
            body.classList.remove('dark-mode');
            body.classList.add('bg-gray-50');

            // Update Toggle Button Styles
            themeToggle.classList.add('bg-gray-200', 'hover:bg-gray-300');
            themeToggle.classList.remove('bg-gray-700', 'hover:bg-gray-600');

            sunIcon.classList.remove('hidden');
            moonIcon.classList.add('hidden');
            localStorage.setItem('theme', 'light');
        }

        function toggleTheme() {
            if (body.classList.contains('dark-mode')) {
                enableLightMode();
            } else {
                enableDarkMode();
            }
        }
        
        // --- Quiz Render Logic (Optimized Click Handler) ---
        function toggleAnswer(element) {
            const answer = element.nextElementSibling;
            
            if (answer.classList.contains('open')) {
                answer.classList.remove('open');
                element.classList.remove('active');
            } else {
                // Optional: Close all other open answers (for a cleaner look)
                document.querySelectorAll('.answer.open').forEach(openAnswer => {
                    openAnswer.classList.remove('open');
                    openAnswer.previousElementSibling.classList.remove('active');
                });

                // Open the current one - Fast execution
                answer.classList.add('open');
                element.classList.add('active');
            }
        }

        function renderQuiz() {
            quizData.forEach((item, index) => {
                const qNum = index + 1;
                
                const questionHTML = `
                    <div class="question-card">
                        <div 
                            class="question-header cursor-pointer p-4 sm:p-5 flex justify-between items-center transition-colors duration-200"
                            onclick="toggleAnswer(this)"
                        >
                            <span class="text-base sm:text-lg font-semibold text-gray-800 flex-grow">
                                <span class="question-number text-blue-600 mr-2">${qNum}.</span> 
                                <span class="question-text">${item.question}</span>
                            </span>
                            <span class="toggle-icon ml-4 h-5 w-5 flex-shrink-0">
                                <svg xmlns="http://www.w3.org/2000/svg" class="text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                                </svg>
                            </span>
                        </div>
                        <div class="answer text-gray-700">
                            <p class="text-base font-medium">
                                <span class="font-bold highlight-text text-blue-700">उत्तर:</span> ${item.answer}
                            </p>
                        </div>
                    </div>
                `;
                quizContainer.insertAdjacentHTML('beforeend', questionHTML);
            });
        }

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderQuiz();
            themeToggle.addEventListener('click', toggleTheme);

            // Apply saved theme or default to light mode
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                enableDarkMode();
            } else {
                enableLightMode();
            }
        });
    </script>
