        let hasAnswered = new Array(questions.length).fill(false);
        const toggleButton = document.getElementById('toggle-button');
        
        // Function to toggle dark mode
        function toggleDarkMode() {
            const root = document.documentElement;
            const isDark = root.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateButtonText(isDark);
        }

        function updateButtonText(isDark) {
            if (toggleButton) {
                toggleButton.innerHTML = isDark ? '🌙 लाइट मोड' : '☀️ डार्क मोड टॉगल करें';
            }
        }

        // Function to initialize the theme from localStorage
        function initializeTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            let isDark = (savedTheme === 'dark') || (!savedTheme && prefersDark);
            
            if (isDark) {
                document.documentElement.classList.add('dark');
            }
            updateButtonText(isDark);
        }

        // Function to handle answer click
        function handleAnswer(questionIndex, selectedIndex) {
            // Prevent multiple answers
            if (hasAnswered[questionIndex]) return;

            hasAnswered[questionIndex] = true;
            const questionElement = document.getElementById(`q-${questionIndex}`);
            const buttons = questionElement.querySelectorAll('.option-button');
            const showAnswerBtn = questionElement.querySelector('.show-answer-btn');
            
            const correctAnswerIndex = questions[questionIndex].correct;
            const explanationElement = document.getElementById(`exp-${questionIndex}`);

            // Disable the "Show Answer" button
            if (showAnswerBtn) {
                showAnswerBtn.disabled = true;
                showAnswerBtn.classList.add('opacity-50', 'cursor-not-allowed');
                showAnswerBtn.textContent = 'उत्तर देखा गया';
            }

            buttons.forEach((button, index) => {
                button.disabled = true; 
                
                // Highlight user's selected option
                if (index === selectedIndex) {
                    if (index === correctAnswerIndex) {
                        button.classList.add('correct');
                        button.innerHTML += ' <span class="float-right font-bold">✅ सही उत्तर</span>';
                    } else {
                        button.classList.add('incorrect');
                        button.innerHTML += ' <span class="float-right font-bold">❌ आपका उत्तर</span>';
                    }
                }
                
                // Highlight correct answer if user chose wrong
                if (index === correctAnswerIndex && index !== selectedIndex) {
                    button.classList.add('correct');
                    if (selectedIndex !== correctAnswerIndex) {
                        button.innerHTML += ' <span class="float-right font-bold">✅ सही उत्तर</span>';
                    }
                }
            });

            // Show explanation
            explanationElement.classList.remove('hidden');
        }

        // Function to handle "Show Answer" button click
        function showCorrectAnswer(questionIndex) {
            // Pass the correct answer index as the selected index to simulate a correct selection
            const correctAnswerIndex = questions[questionIndex].correct;
            handleAnswer(questionIndex, correctAnswerIndex);
        }


        function createQuestionElement(qData, index) {
            // Use PDF's question number (q_num property)
            const absoluteQNumber = qData.q_num;
            
            const element = document.createElement('div');
            element.id = `q-${index}`;
            element.className = 'question-card';
            
            const qText = document.createElement('p');
            qText.className = 'question-text';
            qText.innerHTML = `${absoluteQNumber}. ${qData.q}`; 
            element.appendChild(qText);

            const optionLabels = ['(a)', '(b)', '(c)', '(d)'];
            qData.options.forEach((option, optionIndex) => {
                const button = document.createElement('button');
                button.className = 'option-button';
                button.innerHTML = `${optionLabels[optionIndex]} ${option}`;
                button.onclick = () => handleAnswer(index, optionIndex);
                element.appendChild(button);
            });

            // 5th option: Show Answer Button
            const showAnswerButton = document.createElement('button');
            showAnswerButton.className = 'show-answer-btn';
            showAnswerButton.textContent = 'उत्तर दिखाएँ';
            showAnswerButton.onclick = () => showCorrectAnswer(index);
            element.appendChild(showAnswerButton);


            const explanationDiv = document.createElement('div');
            explanationDiv.id = `exp-${index}`;
            explanationDiv.className = 'explanation hidden';
            
            // Clean up explanation text (remove Ans. (x) - and replace LaTeX)
            let formattedExp = qData.exp;
            formattedExp = formattedExp.replace(/^Ans\.\s*\([a-d]\)\s*-\s*/, '');
            // Simple replacement for common scientific/math notations (as seen in source file logic)
            formattedExp = formattedExp
                .replace(/\\frac\{(.*?)\}\{(.*?)\}/g, '($1 / $2)')
                .replace(/\\times/g, ' x ')
                .replace(/\\propto/g, ' ∝ ')
                .replace(/R\^\{2\}/g, 'R²')
                .replace(/d\^\{2\}/g, 'd²')
                .replace(/\^\{2\}/g, '²')
                .replace(/\^\{3\}/g, '³')
                .replace(/10\^\{-11\}/g, '10⁻¹¹')
                .replace(/(\$\$.*?\$\$|\$.*?\$)/g, (match) => {
                    return match.replace(/\$/g, ''); 
                });

            explanationDiv.innerHTML = `<div class="explanation-title">✅ सही व्याख्या:</div>${formattedExp}`; 
            element.appendChild(explanationDiv);

            return element;
        }

        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            const quizContainer = document.getElementById('quiz-container');
            questions.forEach((q, index) => {
                quizContainer.appendChild(createQuestionElement(q, index));
            });
        });
